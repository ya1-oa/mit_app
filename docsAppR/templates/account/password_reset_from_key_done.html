{% load i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Changed | Claimet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,.4);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            text-align: center;
        }
        .success-header {
            background: linear-gradient(135deg, #059669, #10b981);
            padding: 36px 28px;
            color: #fff;
        }
        .success-icon {
            width: 64px; height: 64px;
            background: rgba(255,255,255,.2);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 14px;
        }
        .success-header h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .success-header p  { font-size: 14px; opacity: .9; margin: 0; }

        .auth-body { padding: 32px 28px; }
        .auth-body p { font-size: 14px; color: #475569; margin-bottom: 24px; line-height: 1.6; }

        .btn-login {
            display: inline-block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1e40af, #0ea5e9);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: opacity .15s;
        }
        .btn-login:hover { opacity: .9; color: #fff; }
    </style>
    <script>
        // Auto-redirect after 5 seconds
        setTimeout(function() {
            window.location.href = "{% url 'account_login' %}";
        }, 5000);
    </script>
</head>
<body>
    <div class="auth-card">
        <div class="success-header">
            <div class="success-icon"><i class="fas fa-check"></i></div>
            <h1>Password changed!</h1>
            <p>Your account is all set</p>
        </div>

        <div class="auth-body">
            <p>Your password has been successfully updated. You can now sign in with your new password.<br><br>
            You'll be redirected to the login page in 5 seconds.</p>
            <a href="{% url 'account_login' %}" class="btn-login">
                <i class="fas fa-sign-in-alt me-2"></i>Sign In Now
            </a>
        </div>
    </div>
</body>
</html>
