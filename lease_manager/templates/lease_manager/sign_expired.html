<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Expired — Claimet</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card-state {
      background: #fff; border-radius: 1.25rem; box-shadow: 0 4px 24px rgba(0,0,0,.09);
      padding: 3rem 2.5rem; max-width: 460px; width: 100%; text-align: center;
    }
    .icon-circle {
      width: 5rem; height: 5rem; background: #f3f4f6; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem; font-size: 2.5rem;
    }
  </style>
</head>
<body>
<div class="card-state">
  <div class="icon-circle">⌛</div>
  <h3 class="fw-bold mb-2">Signing Link Expired</h3>
  <p class="text-muted mb-4">
    This signing link expired on {{ sig_req.expires_at|date:"F j, Y" }}. Signing links are valid for 7 days.
  </p>
  <p class="text-muted" style="font-size:.85rem;">
    Please contact the Claimet team at <strong>{{ lease.client.cEmail|default:"your lease manager" }}</strong> to request a new link.
  </p>
  <div class="mt-3 text-muted" style="font-size:.72rem;">Powered by Claimet</div>
</div>
</body>
</html>
